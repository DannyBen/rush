name: Test
on:
  pull_request:
  push: { branches: master }

jobs:
  test:
    name: Run test suite
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    - name: Run shellcheck tests
      run: shellcheck rush setup uninstall test/setup/run test/setup/cases.sh test/setup/macos_verify_install test/setup/macos_verify_uninstall
    - name: Build container for approval tests
      run: docker compose build
    - name: Run approval tests
      run: docker compose run ci

  ubuntu_setup_uninstall:
    name: Setup/Uninstall (Ubuntu)
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    - name: Run setup/uninstall matrix in Docker
      run: bash test/setup/run

  macos_setup_uninstall:
    name: Setup/Uninstall (macOS)
    runs-on: macos-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    - name: Upgrade the outdated bash
      run: brew install bash
    - name: Run setup
      run: ./setup
    - name: Verify installed artifacts
      run: bash test/setup/macos_verify_install
    - name: Run uninstall
      run: ./uninstall
    - name: Verify uninstall removed executable
      run: bash test/setup/macos_verify_uninstall

  static_analysis:
    name: Static analysis

    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    # Rush needed for easy installation of latest shfmt
    - name: Install rush
      run: curl -Ls http://get.dannyb.co/rush/setup | bash

    - name: Connect rush repo
      run: rush clone dannyben --shallow --default

    - name: Install shfmt and opcode
      run: rush get shfmt && rush get opcode

    - name: Run shellcheck tests
      run: op shellcheck

    - name: Run shfmt tests
      run: op shfmt
